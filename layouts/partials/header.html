<header class="site-header">
  <div class="wrap header-inner">
    <div class="header-top">
      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Colour theme">
        <span class="tt-icon" aria-hidden="true">&#9681;</span>
      </button>
      <a class="brand" href="/">
        <span class="brand-vaults">Vaults of the</span> <span class="brand-odd">ODD</span>
      </a>
      <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false" onclick="this.setAttribute('aria-expanded', this.getAttribute('aria-expanded')==='true'?'false':'true'); document.getElementById('site-nav').classList.toggle('open')">&#9776;</button>
    </div>
    <nav id="site-nav" class="site-nav" aria-label="Primary">
      <ul>
        {{- range .Site.Menus.main }}
        {{- $active := or (eq $.RelPermalink .URL) (and (ne .URL "/") (hasPrefix $.RelPermalink .URL)) }}
        <li><a href="{{ .URL }}"{{ if $active }} class="active"{{ end }}>{{ .Name }}</a></li>
        {{- end }}
      </ul>
    </nav>
  </div>
</header>
<script>
(function () {
  var modes = ['vault', 'dark', 'light'];
  var icons = { vault: '◑', dark: '☾', light: '☀' };   // ◑ ☾ ☀
  var labels = { vault: 'Vault default', dark: 'Dark', light: 'Light' };
  var btn = document.getElementById('theme-toggle');
  if (!btn) return;
  function current() { try { return localStorage.getItem('vo-theme') || 'vault'; } catch (e) { return 'vault'; } }
  function apply(m) {
    if (m === 'vault') { document.documentElement.removeAttribute('data-force'); }
    else { document.documentElement.setAttribute('data-force', m); }
    var ic = btn.querySelector('.tt-icon'); if (ic) ic.innerHTML = icons[m];
    btn.title = 'Colour theme: ' + labels[m];
    btn.setAttribute('aria-label', 'Colour theme: ' + labels[m] + ' (click to change)');
    window.dispatchEvent(new CustomEvent('vo-theme-change', { detail: m }));
  }
  apply(current());
  btn.addEventListener('click', function () {
    var next = modes[(modes.indexOf(current()) + 1) % modes.length];
    try { localStorage.setItem('vo-theme', next); } catch (e) {}
    apply(next);
  });
})();
</script>
<script>
(function () {
  var header = document.querySelector('.site-header');
  if (!header) return;
  var last = window.pageYOffset, threshold = 110, ticking = false;
  function update() {
    var y = window.pageYOffset;
    var nav = document.getElementById('site-nav');
    var menuOpen = nav && nav.classList.contains('open');
    if (!menuOpen && y > threshold && y > last + 4) header.classList.add('is-hidden');
    else if (y < last - 4 || y <= threshold) header.classList.remove('is-hidden');
    last = y; ticking = false;
  }
  window.addEventListener('scroll', function () {
    if (!ticking) { window.requestAnimationFrame(update); ticking = true; }
  }, { passive: true });
})();
</script>
